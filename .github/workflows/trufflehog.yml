name: TruffleHog

# PR + weekly full-history sweep. (Push is intentionally omitted: the action
# errors when a push's base == head, e.g. single-commit pushes; PR + scheduled
# full scans cover the same ground without that flake.)
on:
  pull_request:
    branches: [master]
  schedule:
    - cron: '35 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: TruffleHog secret scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so scheduled runs scan all commits
      - uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          extra_args: --only-verified
