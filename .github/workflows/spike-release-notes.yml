# THROWAWAY SPIKE — delete with scripts/spike-release-notes.mjs once we learn
# what drives the balenaHub block "Release notes" section.
# workflow_dispatch ONLY: never runs on push/PR/tag, so it cannot perturb
# release.yml / publish-ghcr.yml / balena-publish-block.yml.
name: spike-release-notes

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'what to do against the live default release'
        type: choice
        required: true
        default: inventory
        options:
          - inventory
          - write
          - write-note
          - write-asset
          - revert

permissions:
  contents: read

jobs:
  spike:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: package.json
          cache: npm
      - run: npm ci
      - run: node scripts/spike-release-notes.mjs
        env:
          BALENA_API_KEY: ${{ secrets.BALENA_API_KEY }}
          MODE: ${{ inputs.mode }}
