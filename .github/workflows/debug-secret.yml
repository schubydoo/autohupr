name: Debug FLOWZONE_TOKEN visibility

on:
  pull_request:
    branches: [master]

jobs:
  debug:
    runs-on: ubuntu-24.04
    steps:
      - name: Test secret access
        env:
          TOKEN: ${{ secrets.FLOWZONE_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "FLOWZONE_TOKEN: EMPTY"
          else
            echo "FLOWZONE_TOKEN: NON-EMPTY (length=${#TOKEN})"
          fi
          echo "BALENA_API_KEY: ${{ secrets.BALENA_API_KEY != '' && 'NON-EMPTY' || 'EMPTY' }}"
