name: Deploy to balena

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches: [master]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    # Only run on PRs from the same repo. Fork PRs are skipped here for
    # secret safety; the GitHub "Require approval for outside collaborators"
    # setting is the gate for those.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Deploy to aarch64 (marcus7/autohupr-test-aarch64)
        uses: balena-io/deploy-to-balena-action@d03b0ace000ab84714981d2148671a3f06fa97e9 # v2.2.13
        with:
          balena_token: ${{ secrets.BALENA_API_KEY }}
          fleet: marcus7/autohupr-test-aarch64
      - name: Deploy to amd64 (marcus7/autohupr-test-amd64)
        if: ${{ !cancelled() }}
        uses: balena-io/deploy-to-balena-action@d03b0ace000ab84714981d2148671a3f06fa97e9 # v2.2.13
        with:
          balena_token: ${{ secrets.BALENA_API_KEY }}
          fleet: marcus7/autohupr-test-amd64
      - name: Deploy to armv7hf (marcus7/autohupr-test-armv7hf)
        if: ${{ !cancelled() }}
        uses: balena-io/deploy-to-balena-action@d03b0ace000ab84714981d2148671a3f06fa97e9 # v2.2.13
        with:
          balena_token: ${{ secrets.BALENA_API_KEY }}
          fleet: marcus7/autohupr-test-armv7hf
