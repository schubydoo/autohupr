name: Flowzone

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches: [master]
  pull_request_target:
    types: [opened, synchronize, closed]
    branches: [master]

jobs:
  flowzone:
    name: Flowzone
    uses: product-os/flowzone/.github/workflows/flowzone.yml@52950052c36516d5ddd634a10929293160f6d42e
    secrets: inherit
    with:
      # Block fork PRs from invoking arbitrary third-party actions.
      restrict_custom_actions: true
      # Three test fleets, one per supported arch.
      balena_slugs: "marcus7/autohupr-test-aarch64,marcus7/autohupr-test-amd64,marcus7/autohupr-test-armv7hf"
