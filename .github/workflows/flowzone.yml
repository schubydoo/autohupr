name: Flowzone

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches: [master]
  pull_request_target:
    types: [opened, synchronize, closed]
    branches: [master]

jobs:
  flowzone:
    name: Flowzone
    uses: product-os/flowzone/.github/workflows/flowzone.yml@52950052c36516d5ddd634a10929293160f6d42e
    secrets: inherit
    with:
      # Block fork PRs from invoking arbitrary third-party actions.
      restrict_custom_actions: true
      # TODO(setup): fill in once a test fleet exists, e.g. gh_schubydoo/autohupr-test.
      # Leave empty for now — Flowzone skips the deploy step when this is unset.
      balena_slugs: ""
