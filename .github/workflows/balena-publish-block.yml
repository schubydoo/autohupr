name: Publish block to balenaHub

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Push release to balena block
        uses: balena-io/deploy-to-balena-action@a1ad4ddddc982b50533e86d3fdc4731c5184f497 # v2.2.3
        with:
          balena_token: ${{ secrets.BALENA_API_KEY }}
          fleet: marcus7/autohupr

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: package.json
          cache: npm
      - run: npm ci
      - name: Set release notes + upload CHANGELOG asset
        run: node scripts/publish-release-notes.mjs
        env:
          BALENA_API_KEY: ${{ secrets.BALENA_API_KEY }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
